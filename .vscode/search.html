<!DOCTYPE html>
<html>
<head>
  <title>Search Location</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding-top: 100px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #results {
      margin-top: 20px;
      font-size: 18px;
    }

    .result {
      color: blue;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Search Location</h2>

<input type="text" id="location" placeholder="Enter location">
<button onclick="search()">Search</button>

<div id="results"></div>

<script>
  function search() {
    var loc = document.getElementById("location").value;

    // save data
    localStorage.setItem("place", loc);

    var resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    var p = document.createElement("p");
    p.innerText = loc;
    p.className = "result";

    // click → details page
    p.onclick = function () {
      window.location.href = "details.html";
    };

    resultsDiv.appendChild(p);
  }
</script>

</body>
</html>
